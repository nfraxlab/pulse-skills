name: Pulse Skills - Sync Pulse Preview

on:
  push:
    branches: [main]

concurrency:
  group: pulse-skills-dispatch-preview
  cancel-in-progress: true

jobs:
  validate-and-dispatch:
    name: Validate bundle and trigger Pulse preview
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 1.8.0
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Verify manifest and index are current
        run: |
          poetry run python scripts/generate_manifest.py
          git diff --exit-code -- manifest.json INDEX.md

      - name: Build pulse-skills artifact
        run: poetry build --no-interaction

      - name: Verify Pulse dispatch token
        env:
          PULSE_REPO_DISPATCH_TOKEN: ${{ secrets.PULSE_REPO_DISPATCH_TOKEN }}
        run: |
          if [ -z "$PULSE_REPO_DISPATCH_TOKEN" ]; then
            echo "Missing required GitHub secret: PULSE_REPO_DISPATCH_TOKEN"
            exit 1
          fi

      - name: Trigger Pulse preview API workflow
        env:
          PULSE_REPO_DISPATCH_TOKEN: ${{ secrets.PULSE_REPO_DISPATCH_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PULSE_REPO_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/nfraxlab/pulse/dispatches \
            -d '{
              "event_type": "pulse-skills-updated",
              "client_payload": {
                "pulse_skills_repository": "${{ github.repository }}"
              }
            }'